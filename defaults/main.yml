---
k8s_is_master: False
k8s_action: 'install'

k8s_service_name: 'k8s'
k8s_service_path: '/etc/kubernetes'
k8s_service_logs_path: '/var/lib/kuberntes'

k8s_group: 'kub'
k8s_gid: 1000

k8s_containerd_url: 'https://github.com/containerd/containerd/releases/download/v{{ k8s_containerd_version}}/containerd-{{ k8s_containerd_version}}-linux-amd64.tar.gz'
k8s_containerd_version: '2.2.1'
k8s_containerd_tarball_sha256: 'sha256:f5d8e90ecb6c1c7e33ecddf8cc268a93b9e5b54e0e850320d765511d76624f41'
k8s_containerd_tmp_path: '/tmp/containerd-{{ k8s_containerd_version }}.tar.gz'

k8s_packages_dependencies:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release

k8s_containerd_gpg_url: 'https://download.docker.com/linux/ubuntu/gpg'
k8s_containerd_apt_repo: 'deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable'
k8s_containerd_config_dir: '/etc/containerd'

k8s_packages_lists:
  - 'kubelet={{ k8s_version }}.*'
  - 'kubeadm={{ k8s_version }}.*'

k8s_version: '1.36'
k8s_upgrade_version: '{{ k8s_version }}'

k8s_apt_key_url: 'https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/'
k8s_apt_key_path: '/etc/apt/keyrings/kubernetes-apt-keyring.asc'
k8s_apt_repo_filename: 'kubernetes.list'
k8s_master_ip: '{{ ansible_local.wireguard.vpn_ip }}'
k8s_master_packages:
  - 'kubectl={{ k8s_version }}.*'
  - 'etcd-client'
k8s_master_kubadmin_config_path: '/etc/kubernetes/kubeadm-config.yaml'
#k8s_master_ip: '10.10.10.10'
# Api Server
k8s_master_api_server_port: 6443
# Controller Manager
k8s_master_controller_manager_port: 10257
k8s_controler_additional_san: '{{ hostname }}.status.im'
# Scheduler
k8s_master_scheduler_port: 10259
# etc
k8s_master_etcd_port_client: 2379
k8s_master_etcd_port_peers: 2380
k8s_master_etcd_port_metrics: 2381

k8s_calico_mtu: 1360

k8s_node_labels: {}
#  key: value

k8s_node_taints: []
#  - key: 'key'
#    value: 'value'
#    effect: 'NoSchedule' # Options: NoSchedule, PreferNoSchedule, NoExecute

# ETCD Backup
k8s_etcd_backup_service_name: 'dump-k8s-etcd'
k8s_etcd_backup_path: '/var/etcd/'
k8s_etcd_backup_user: 'root'
k8s_etcd_backup_group: 'kub'
k8s_etcd_backup_frequency: 'daily'
k8s_etcd_backup_timeout: '300'


# Vaul config for saving the joining token
k8s_master_vault_token_path: '{{ env }}/{{ stage }}/kubernetes'
vault_token: '{{ lookup("ansible.builtin.env", "VAULT_TOKEN")}}'
vault_addr:             '{{ lookup("ansible.builtin.env", "VAULT_ADDR") }}'
vault_ca_path:          '/certs/vault-ca.crt'
vault_client_cert_path: '/certs/vault-client.crt'
vault_client_key_path:  '/certs/vault-client.key'

k8s_pod_network_config_url: 'https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml'

k8s_pod_subnet: '192.168.0.0/16'
k8s_service_subnet: '172.16.0.0/12'
k8s_cluster_domain: '{{ env }}.{{ stage }}'

k8s_cluster_token: ~
k8s_ca_cert_hashes: ~

k8s_kubelet_service_name: 'kubelet'
k8s_kubelet_port: 10248

k8s_consul_port: 8500
k8s_consul_host: 'localhost'
k8s_consul_addr: '{{ k8s_consul_host }}:{{ k8s_consul_port }}'
k8s_consul_catalog_url: 'http://{{ k8s_consul_addr }}/v1/catalog'
